name: Coverage upload

on:
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows: [Test-backend]
    types: [completed]

permissions: {}

jobs:
  coverage-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      statuses: write
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"
      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            backend/pyproject.toml
            uv.lock
      - run: uv sync --package covered
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-html
          path: htmlcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Upload coverage to hosting
        run: uv run covered htmlcov
        env:
          COVERED_API_URL: ${{ secrets.COVERED_API_URL }} # zizmor: ignore[secrets-outside-env]
          COVERED_API_KEY: ${{ secrets.COVERED_API_KEY }} # zizmor: ignore[secrets-outside-env]
          COVERED_REPO_OWNER: ${{ github.repository_owner }}
          COVERED_REPO_NAME: ${{ github.event.repository.name }}
          COVERED_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          COVERED_COVERAGE_THRESHOLD: ${{ vars.COVERAGE_THRESHOLD || 100 }}
          COVERED_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERED_IS_DEFAULT_BRANCH: ${{ github.event.workflow_run.head_branch == github.event.repository.default_branch }}
